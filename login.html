<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - CipherDataHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="max-width:420px;margin:80px auto;">
    <h2>Sign in</h2>
    <form id="loginForm" class="auth-form">
      <label>Email</label>
      <input id="email" type="email" class="form-input" required>
      <label>Password</label>
      <input id="password" type="password" class="form-input" required>
      <button class="staB" type="submit">Sign In</button>
    </form>
    <p style="margin-top:12px">New here? <a href="register.html">Create account</a></p>
  </div>
  <script src="auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email=document.getElementById('email').value.trim();
      const password=document.getElementById('password').value;
      const res=loginUser(email,password);
      if(!res.ok){ alert(res.msg); return; }
      alert('Signed in');
      window.location.href='index.html';
    });
  </script>
</body>
</html>
